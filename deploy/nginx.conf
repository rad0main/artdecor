# ═══════════════════════════════════════════════════════════════
# nginx.conf — конфигурация для ArtDecor
# Установка: cp deploy/nginx.conf /etc/nginx/sites-available/artdecor
#            ln -sf /etc/nginx/sites-available/artdecor /etc/nginx/sites-enabled/
#            nginx -t && systemctl reload nginx
# ═══════════════════════════════════════════════════════════════

upstream php-fpm {
    server unix:/run/php/php8.3-fpm.sock;
    keepalive 16;
}

server {
    listen 80;
    server_name artdecor.ru www.artdecor.ru;
    root /var/www/artdecor/public;

    index index.php;

    # ─── Logs ──────────────────────────────────────────────
    access_log /var/log/nginx/artdecor-access.log;
    error_log  /var/log/nginx/artdecor-error.log;

    # ─── Security headers ──────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Static assets caching ─────────────────────────────
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /storage/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /favicon.ico {
        access_log off;
        log_not_found off;
        expires 1y;
    }

    location /robots.txt {
        access_log off;
        log_not_found off;
    }

    # ─── Laravel entry point ───────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        include fastcgi_params;

        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 120;
        fastcgi_send_timeout 120;
        fastcgi_keep_conn on;
    }

    # ─── Deny sensitive files ──────────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.env {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /storage/framework/ {
        internal;
    }
}
